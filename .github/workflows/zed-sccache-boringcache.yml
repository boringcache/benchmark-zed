name: "Zed sccache - BoringCache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'BC Rolling' || 'BC Fresh', github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      cli_ref:
        description: "Internal benchmark diagnostic only: build this boringcache/cli ref instead of using the released CLI"
        required: false
        type: string
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override (blank = adaptive)"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override (blank = match download concurrency)"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES (Docker/OCI only; blank = disabled)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/zed-sccache-boringcache.yml"
      - ".github/workflows/zed-sccache-actions-cache.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: zed-industries/zed
  BENCHMARK_ID: zed-sccache
  BENCHMARK_WORKSPACE: ${{ github.repository }}
  CLI_RUST_VERSION: "1.93"
  PROJECT_RUST_VERSION: "1.95.0"
  BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
  BORINGCACHE_BLOB_PREFETCH_CONCURRENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
  BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}

jobs:
  prepare-cli:
    name: Prepare benchmark CLI (release by default, internal override only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      use_custom_cli: ${{ steps.resolve.outputs.use_custom_cli }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      cli_source: ${{ steps.metadata.outputs.cli_source }}
      cli_ref: ${{ steps.metadata.outputs.cli_ref }}
      cli_version: ${{ steps.metadata.outputs.cli_version }}
    steps:
      - name: Resolve CLI source
        id: resolve
        run: |
          set -euo pipefail
          requested_ref="${{ github.event.inputs.cli_ref || '' }}"
          if [[ -n "$requested_ref" ]]; then
            echo "use_custom_cli=true" >> "$GITHUB_OUTPUT"
            echo "artifact_name=boringcache-cli-linux-amd64" >> "$GITHUB_OUTPUT"
          else
            echo "use_custom_cli=false" >> "$GITHUB_OUTPUT"
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
          fi
          echo "requested_ref=${requested_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout CLI repo
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: actions/checkout@v6
        with:
          repository: boringcache/cli
          ref: ${{ steps.resolve.outputs.requested_ref }}

      - name: Setup Rust for custom CLI build
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.CLI_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: .
          cache-runtime: false
          cache-cargo: false
          cache-target: false
          sccache: false

      - name: Capture resolved CLI ref
        if: steps.resolve.outputs.use_custom_cli == 'true'
        id: resolved_ref
        run: |
          set -euo pipefail
          echo "cli_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build custom CLI
        if: steps.resolve.outputs.use_custom_cli == 'true'
        run: cargo build --release --locked

      - name: Upload custom CLI artifact
        if: steps.resolve.outputs.use_custom_cli == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          path: target/release/boringcache
          if-no-files-found: error
          compression-level: 0

      - name: Finalize CLI metadata
        id: metadata
        run: |
          set -euo pipefail
          if [[ "${{ steps.resolve.outputs.use_custom_cli }}" == "true" ]]; then
            echo "cli_source=custom" >> "$GITHUB_OUTPUT"
            echo "cli_ref=${{ steps.resolved_ref.outputs.cli_ref }}" >> "$GITHUB_OUTPUT"
            echo "cli_version=" >> "$GITHUB_OUTPUT"
            {
              echo "### BoringCache CLI"
              echo ""
              echo "Internal benchmark diagnostic path: using custom boringcache/cli ref \`${{ steps.resolved_ref.outputs.cli_ref }}\`."
              echo "Launch proof runs should leave \`cli_ref\` empty and use the CLI bundled by \`boringcache/one@v1\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "cli_source=action" >> "$GITHUB_OUTPUT"
            echo "cli_ref=boringcache/one@v1" >> "$GITHUB_OUTPUT"
            echo "cli_version=" >> "$GITHUB_OUTPUT"
            {
              echo "### BoringCache CLI"
              echo ""
              echo "Released product path: using the CLI bundled by \`boringcache/one@v1\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  seed-cache:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'sccache Commit Build (BoringCache, rolling)' || 'sccache Cold Build (BoringCache, fresh)' }}
    needs: prepare-cli
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      BORINGCACHE_PROXY_METADATA_HINTS: benchmark=zed-sccache,phase=${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'rolling' || 'seed' }}
    outputs:
      tags_csv: ${{ steps.resolved_seed_tags.outputs.tags_csv }}
      sccache_tag: ${{ steps.resolved_seed_tags.outputs.sccache_tag }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      cold_build_seconds: ${{ steps.cold_baseline_build.outputs.build_seconds }}
    steps:
      - name: Validate BoringCache secrets
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BoringCache restore token" >&2; exit 1; }
          [[ -n "${BORINGCACHE_SAVE_TOKEN}" ]] || { echo "Missing BoringCache save token" >&2; exit 1; }

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Free runner disk space
        run: ./scripts/free-runner-disk.sh

      - name: Prepare base benchmark source tree
        run: ./scripts/prepare-source.sh base

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash ./scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: boringcache --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libglib2.0-dev libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Configure boringcache/one for Rust toolchain
        uses: boringcache/one@v1
        with:
          cli-version: ${{ needs.prepare-cli.outputs.use_custom_cli == 'true' && 'skip' || '' }}
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.PROJECT_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ./upstream
          cache-runtime: false
          cache-cargo: false
          cache-target: false
          sccache: false
          verbose: true

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" == "rolling" ]]; then
            cache_tag_prefix="${BENCHMARK_ID}-rolling-${ref_slug}"
          else
            cache_tag_prefix="${BENCHMARK_ID}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "cache_tag_prefix=${cache_tag_prefix}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          timing_file="${BENCHMARK_TIMING_FILE:-}"
          stats_file="${BENCHMARK_SCCACHE_STATS_FILE:-}"
          build_seconds=""

          write_timing() {
            if [[ -n "$timing_file" ]]; then
              printf '%s=%s\n' "$1" "$2" >> "$timing_file"
            fi
          }

          run_cold_build() {
            (
              cd upstream
              cargo build --release
            )
          }

          run_cached_build() {
            export SCCACHE_IDLE_TIMEOUT="0"
            # Cargo git checkouts with nested submodules are not offline-complete
            # after archive restore because .git metadata is excluded from saved
            # entries. Allow network fallback so warm runs reflect the real
            # restore state instead of failing outright.
            unset CARGO_NET_OFFLINE
            mkdir -p "${SCCACHE_DIR:-${HOME}/.cache/sccache}"
            write_timing proxy_ready_seconds 0
            sccache --zero-stats >/dev/null 2>&1 || true

            local started_at
            started_at="$(date +%s)"
            (
              cd upstream
              cargo build --release
            )
            if [[ -n "$stats_file" ]]; then
              sccache --show-stats | tee "$stats_file" || true
            else
              sccache --show-stats || true
            fi
            build_seconds=$(( $(date +%s) - started_at ))
            write_timing build_seconds "$build_seconds"
          }

          if [[ -n "$timing_file" ]]; then
            : > "$timing_file"
          fi

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              run_cached_build
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Reset local seed state
        run: |
          set -euo pipefail
          rm -rf upstream/target
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" != "rolling" ]]; then
            rm -rf "$HOME/.cargo/registry" "$HOME/.cargo/git" "$HOME/.cache/sccache"
          fi

      - name: Capture managed rust-sccache setup start
        id: managed_seed_setup_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Configure boringcache/one for Rust sccache benchmark
        id: managed_seed_setup
        uses: boringcache/one@v1
        with:
          cli-version: ${{ needs.prepare-cli.outputs.use_custom_cli == 'true' && 'skip' || '' }}
          setup: mise
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ./upstream
          cache-tag: ${{ steps.scope.outputs.cache_tag_prefix }}
          cache-cargo: true
          cache-target: false
          tools: rust@${{ env.PROJECT_RUST_VERSION }}
          sccache: true
          sccache-mode: proxy
          sccache-version: 0.14.0
          proxy-port: 5000
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}

      - name: Capture resolved BoringCache tags
        id: resolved_seed_tags
        run: |
          set -euo pipefail
          tags=()
          for tag in \
            "${{ steps.managed_seed_setup.outputs.cargo-tag }}" \
            "${{ steps.managed_seed_setup.outputs.cargo-git-tag }}" \
            "${{ steps.managed_seed_setup.outputs.sccache-tag }}"; do
            if [[ -n "$tag" ]]; then
              tags+=("$tag")
            fi
          done
          tags_csv="$(IFS=,; echo "${tags[*]}")"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          echo "sccache_tag=${{ steps.managed_seed_setup.outputs.sccache-tag }}" >> "$GITHUB_OUTPUT"

      - name: Capture managed rust-sccache setup timing
        id: managed_seed_setup_timing
        run: |
          set -euo pipefail
          start="${{ steps.managed_seed_setup_start.outputs.started_at }}"
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Run rolling commit build' || 'Run fresh cold build' }}
        id: cold_baseline_build
        run: |
          set -euo pipefail
          phase_start="${{ steps.managed_seed_setup_start.outputs.started_at }}"
          start="$(date +%s)"
          ./run-zed-sccache-phase.sh seed
          end="$(date +%s)"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Collect BoringCache diagnostics
        if: always() && hashFiles('scripts/collect-boringcache-diagnostics.sh') != ''
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/collect-boringcache-diagnostics.sh \
            --output-dir "boringcache-diag-seed" \
            --workspace "$BENCHMARK_WORKSPACE" \
            --tags "${{ steps.resolved_seed_tags.outputs.tags_csv }}" \
            --phase "seed" \
            --cache-tag "${{ steps.resolved_seed_tags.outputs.sccache_tag }}" \
            --cli-source "${{ needs.prepare-cli.outputs.cli_source }}" \
            --cli-ref "${{ needs.prepare-cli.outputs.cli_ref }}" \
            --proxy-port "${{ steps.managed_seed_setup.outputs.proxy-port }}" \
            --proxy-log-path "${{ steps.managed_seed_setup.outputs.proxy-log-path }}" \
            --cache-root "$HOME/.cache/sccache" \
            --cache-label "sccache-cache"

      - name: Upload BoringCache diagnostics
        if: always() && hashFiles('boringcache-diag-seed/**/*') != ''
        uses: actions/upload-artifact@v6
        with:
          name: boringcache-diag-${{ env.BENCHMARK_ID }}-seed-boringcache
          path: boringcache-diag-seed
          if-no-files-found: warn


  scenario-builds:
    name: sccache Warm rerun (BoringCache)
    needs: [prepare-cli, seed-cache]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      BORINGCACHE_PROXY_METADATA_HINTS: benchmark=zed-sccache,phase=warm
    steps:
      - name: Validate BoringCache restore secret
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${BORINGCACHE_RESTORE_TOKEN}" ]] || { echo "Missing BoringCache restore token" >&2; exit 1; }

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Free runner disk space
        run: ./scripts/free-runner-disk.sh

      - name: Prepare scenario source tree
        run: ./scripts/prepare-source.sh warm1

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash ./scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: boringcache --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libvulkan-dev \
            libasound2-dev libfontconfig1-dev libfreetype6-dev \
            libglib2.0-dev libssl-dev pkg-config cmake \
            libx11-dev libx11-xcb-dev libxcb1-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev

      - name: Configure boringcache/one for Rust toolchain
        uses: boringcache/one@v1
        with:
          cli-version: ${{ needs.prepare-cli.outputs.use_custom_cli == 'true' && 'skip' || '' }}
          setup: mise
          mode: rust-sccache
          tools: rust@${{ env.PROJECT_RUST_VERSION }}
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ./upstream
          cache-runtime: false
          cache-cargo: false
          cache-target: false
          sccache: false
          verbose: true

      - name: Prepare benchmark scope and helpers
        id: scope
        run: |
          set -euo pipefail

          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" == "rolling" ]]; then
            cache_tag_prefix="${BENCHMARK_ID}-rolling-${ref_slug}"
          else
            cache_tag_prefix="${BENCHMARK_ID}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi

          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"
          echo "cache_tag_prefix=${cache_tag_prefix}" >> "$GITHUB_OUTPUT"

          cat > ./run-zed-sccache-phase.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          mode="${1:-warm}"
          timing_file="${BENCHMARK_TIMING_FILE:-}"
          stats_file="${BENCHMARK_SCCACHE_STATS_FILE:-}"
          build_seconds=""

          write_timing() {
            if [[ -n "$timing_file" ]]; then
              printf '%s=%s\n' "$1" "$2" >> "$timing_file"
            fi
          }

          run_cold_build() {
            (
              cd upstream
              cargo build --release
            )
          }

          run_cached_build() {
            export SCCACHE_IDLE_TIMEOUT="0"
            # Cargo git checkouts with nested submodules are not offline-complete
            # after archive restore because .git metadata is excluded from saved
            # entries. Allow network fallback so warm runs reflect the real
            # restore state instead of failing outright.
            unset CARGO_NET_OFFLINE
            mkdir -p "${SCCACHE_DIR:-${HOME}/.cache/sccache}"
            write_timing proxy_ready_seconds 0
            sccache --zero-stats >/dev/null 2>&1 || true

            local started_at
            started_at="$(date +%s)"
            (
              cd upstream
              cargo build --release
            )
            if [[ -n "$stats_file" ]]; then
              sccache --show-stats | tee "$stats_file" || true
            else
              sccache --show-stats || true
            fi
            build_seconds=$(( $(date +%s) - started_at ))
            write_timing build_seconds "$build_seconds"
          }

          if [[ -n "$timing_file" ]]; then
            : > "$timing_file"
          fi

          case "$mode" in
            cold)
              run_cold_build
              ;;
            seed|warm)
              run_cached_build
              ;;
            *)
              echo "Unknown mode: $mode" >&2
              exit 1
              ;;
          esac
          SH
          chmod +x ./run-zed-sccache-phase.sh

      - name: Reset local scenario state
        run: |
          set -euo pipefail
          rm -rf upstream/target "$HOME/.cache/sccache"

      - name: Capture managed rust-sccache setup start
        id: managed_scenario_setup_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Configure boringcache/one for Rust sccache benchmark
        id: managed_scenario_setup
        uses: boringcache/one@v1
        with:
          cli-version: ${{ needs.prepare-cli.outputs.use_custom_cli == 'true' && 'skip' || '' }}
          setup: mise
          mode: rust-sccache
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          working-directory: ./upstream
          cache-tag: ${{ steps.scope.outputs.cache_tag_prefix }}
          cache-cargo: true
          cache-target: false
          tools: rust@${{ env.PROJECT_RUST_VERSION }}
          sccache: true
          sccache-mode: proxy
          read-only: true
          save-policy: off
          sccache-version: 0.14.0
          proxy-port: 5000
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}

      - name: Capture resolved BoringCache tags
        id: resolved_scenario_tags
        run: |
          set -euo pipefail
          tags=()
          for tag in \
            "${{ steps.managed_scenario_setup.outputs.cargo-tag }}" \
            "${{ steps.managed_scenario_setup.outputs.cargo-git-tag }}" \
            "${{ steps.managed_scenario_setup.outputs.sccache-tag }}"; do
            if [[ -n "$tag" ]]; then
              tags+=("$tag")
            fi
          done
          tags_csv="$(IFS=,; echo "${tags[*]}")"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          echo "sccache_tag=${{ steps.managed_scenario_setup.outputs.sccache-tag }}" >> "$GITHUB_OUTPUT"

      - name: Capture managed rust-sccache setup timing
        id: managed_scenario_setup_timing
        run: |
          set -euo pipefail
          start="${{ steps.managed_scenario_setup_start.outputs.started_at }}"
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run warm build 1
        id: warm1_build
        run: |
          set -euo pipefail
          timing_file="/tmp/zed-sccache-warm1-timing.env"
          phase_start="${{ steps.managed_scenario_setup_start.outputs.started_at }}"
          start="$(date +%s)"
          stats_file="/tmp/zed-sccache-warm1-stats.txt"
          BENCHMARK_PHASE_LABEL="warm1" BENCHMARK_TIMING_FILE="$timing_file" BENCHMARK_SCCACHE_STATS_FILE="$stats_file" ./run-zed-sccache-phase.sh warm
          end="$(date +%s)"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=$(grep '^proxy_ready_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$(grep '^build_seconds=' "$timing_file" | head -n1 | cut -d= -f2-)" >> "$GITHUB_OUTPUT"


      - name: Collect BoringCache diagnostics
        if: always() && hashFiles('scripts/collect-boringcache-diagnostics.sh') != ''
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/collect-boringcache-diagnostics.sh \
            --output-dir "boringcache-diag-warm1" \
            --workspace "$BENCHMARK_WORKSPACE" \
            --tags "${{ steps.resolved_scenario_tags.outputs.tags_csv }}" \
            --phase "warm1" \
            --cache-tag "${{ steps.resolved_scenario_tags.outputs.sccache_tag }}" \
            --cli-source "${{ needs.prepare-cli.outputs.cli_source }}" \
            --cli-ref "${{ needs.prepare-cli.outputs.cli_ref }}" \
            --proxy-port "${{ steps.managed_scenario_setup.outputs.proxy-port }}" \
            --proxy-log-path "${{ steps.managed_scenario_setup.outputs.proxy-log-path }}" \
            --cache-root "$HOME/.cache/sccache" \
            --cache-label "sccache-cache"

      - name: Upload BoringCache diagnostics
        if: always() && hashFiles('boringcache-diag-warm1/**/*') != ''
        uses: actions/upload-artifact@v6
        with:
          name: boringcache-diag-${{ env.BENCHMARK_ID }}-warm1-boringcache
          path: boringcache-diag-warm1
          if-no-files-found: warn

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          restore_seconds=""
          proxy_ready_seconds=""
          build_seconds=""
          seconds="${{ steps.warm1_build.outputs.seconds }}"
          restore_seconds="${{ steps.managed_scenario_setup_timing.outputs.seconds }}"
          proxy_ready_seconds="${{ steps.warm1_build.outputs.proxy_ready_seconds }}"
          build_seconds="${{ steps.warm1_build.outputs.build_seconds }}"
          if [[ -z "${seconds}" || -z "${restore_seconds}" || -z "${proxy_ready_seconds}" || -z "${build_seconds}" ]]; then
            echo "No timing captured for warm1" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
          echo "restore_seconds=${restore_seconds}" >> "$GITHUB_OUTPUT"
          echo "proxy_ready_seconds=${proxy_ready_seconds}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          echo "end_to_end_seconds=${seconds}" >> "$GITHUB_OUTPUT"
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/warm1.env" <<EOF
          phase=warm1
          seconds=${{ steps.phase_timing.outputs.seconds }}
          restore_seconds=${{ steps.phase_timing.outputs.restore_seconds }}
          proxy_ready_seconds=${{ steps.phase_timing.outputs.proxy_ready_seconds }}
          build_seconds=${{ steps.phase_timing.outputs.build_seconds }}
          end_to_end_seconds=${{ steps.phase_timing.outputs.end_to_end_seconds }}
          EOF
          stats_file="/tmp/zed-sccache-warm1-stats.txt"
          if [[ -f "$stats_file" ]]; then
            cp "$stats_file" "benchmark-phase/warm1-sccache-stats.txt"
          fi
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-warm1
          path: benchmark-phase/warm1*
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [prepare-cli, seed-cache, scenario-builds]
    if: ${{ always() && needs.prepare-cli.result == 'success' && needs.seed-cache.result == 'success' && (needs.scenario-builds.result == 'success' || needs.scenario-builds.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Install BoringCache CLI with boringcache/one
        if: needs.prepare-cli.outputs.use_custom_cli != 'true'
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-runtime: false

      - name: Download custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.prepare-cli.outputs.artifact_name }}
          path: ${{ runner.temp }}/boringcache-cli-artifact

      - name: Install custom CLI artifact
        if: needs.prepare-cli.outputs.use_custom_cli == 'true'
        run: |
          set -euo pipefail
          bash ./scripts/install-benchmark-cli.sh \
            --artifact-dir "${RUNNER_TEMP}/boringcache-cli-artifact"

      - name: Verify BoringCache CLI
        run: boringcache --version

      - name: Download scenario timing artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local key="${phase//-/_}"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
            local build_seconds
            build_seconds="$(grep "^build_seconds=" "$file" | head -n1 | cut -d= -f2- || true)"
            if [[ -n "${build_seconds}" ]]; then
              echo "${key}_build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
            fi
          }
          parse_phase warm1
      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
          BORINGCACHE_EXACT_TAGS: ${{ needs.seed-cache.outputs.sccache_tag }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(./scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Capture committed upstream ref
        id: upstream_ref
        run: echo "sha=$(git rev-parse HEAD:upstream)" >> "$GITHUB_OUTPUT"

      - name: Collect BoringCache action timing report
        id: action_timing_report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 ./scripts/collect-boringcache-action-timings.py \
            --benchmark "$BENCHMARK_ID" \
            --run-id "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --output-dir benchmark-results

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          ./scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --lane "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "${{ steps.upstream_ref.outputs.sha }}" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --cold-build-seconds "${{ needs.seed-cache.outputs.cold_build_seconds }}" \
            --warm1-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_seconds }}" \
            --warm1-build-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_build_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --action-timings-json "${{ steps.action_timing_report.outputs.json_path }}" \
            --hit-behavior-note "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Rolling lane: this run builds the current upstream commit as-is with the prior rolling cache available, exports the updated cache, and records that commit build only; warm1 follow-up runs are intentionally skipped.' || 'Fresh lane: the cold build and warm rerun use boringcache/one@v1 in mode=rust-sccache so the product manages Rust setup, cargo archive restore/save, sccache install, and the proxy-backed remote cache wiring. Warm1 restores the same run-scoped cargo and sccache state on a fresh runner in read-only mode and rebuilds the same pinned source tree without synthetic mutations.' }}"

      - name: Write phase timing breakdown
        id: phase_breakdown
        run: |
          python3 ./scripts/write-phase-timing-breakdown.py \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --phase-dir benchmark-phase \
            --output-dir benchmark-results

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
            ${{ steps.phase_breakdown.outputs.json_path }}
            ${{ steps.phase_breakdown.outputs.md_path }}
            ${{ steps.action_timing_report.outputs.json_path }}
            ${{ steps.action_timing_report.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: |
          cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.action_timing_report.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.phase_breakdown.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"

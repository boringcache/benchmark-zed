name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override for the BC run"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override for the BC run"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI BC runs"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch rolling benchmark lanes
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch AC rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "zed-sccache-actions-cache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling

      - name: Dispatch Depot rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "zed-sccache-depot-cache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling

      - name: Dispatch BC rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run "zed-sccache-boringcache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}"
          -f cache_lane=rolling
          -f blob_download_concurrency="${{ inputs.blob_download_concurrency || '' }}"
          -f blob_prefetch_concurrency="${{ inputs.blob_prefetch_concurrency || '' }}"
          -f oci_stream_through_min_bytes="${{ inputs.oci_stream_through_min_bytes || '' }}"

name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch rolling benchmark pair
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch AC rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "zed-sccache-actions-cache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling

      - name: Dispatch BC rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "zed-sccache-boringcache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling
